name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs that need more ask for it explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type check · lint · format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.minimum-release-age=0
      - run: pnpm check:context
      - run: pnpm typecheck
      - run: pnpm check

  fallow:
    name: Code intelligence (Fallow)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: fallow-rs/fallow@v2
        with:
          command: audit
          no-cache: true
          comment: true
          review-comments: true

  test:
    name: Unit + component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.minimum-release-age=0
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v7
        if: failure()
        continue-on-error: true
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 3

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.minimum-release-age=0
      - run: pnpm build
      - name: Bundle-size budget
        run: pnpm size
      - uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: dist
          path: dist/
          retention-days: 3

  e2e:
    name: End-to-end behaviour map
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.minimum-release-age=0
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 3

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.minimum-release-age=0
      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high
      - name: License compliance
        run: pnpm license:check
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
