name: CodeQL

# Static application security testing (SAST). Biome is style/correctness only —
# this is the gate that reasons about taint and vulnerability patterns in the
# source itself. Results surface in the repo's Security tab.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC — catches advisories in code that hasn't changed

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
