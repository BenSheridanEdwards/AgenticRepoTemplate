name: Lighthouse

# Performance + accessibility budget against the production build. Runs on pull
# requests (it needs a build to score, and PR is where a regression should be
# caught). Accessibility is a hard floor; performance/best-practices are advisory
# — see lighthouserc.json.
on: pull_request

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec lhci autorun
