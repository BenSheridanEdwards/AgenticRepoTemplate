name: StyleProof

on: pull_request

# The report comment, the report branch, and the StyleProof commit status all
# need write access.
permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: styleproof-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  styleproof:
    name: Computed-style visual gate
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://localhost:3000
      STYLEPROOF_VERSION: "4.0.1"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - id: maps
        name: Restore cached StyleProof maps
        shell: bash
        run: |
          set +e
          rm -rf __stylemaps__
          pnpm exec styleproof-map --restore --sha "${{ github.event.pull_request.base.sha }}" --dir base --base-dir __stylemaps__ --spec e2e/styleproof.spec.ts
          base_code=$?
          pnpm exec styleproof-map --restore --sha "${{ github.event.pull_request.head.sha }}" --dir head --base-dir __stylemaps__ --spec e2e/styleproof.spec.ts
          head_code=$?
          set -e
          if [ "$base_code" -eq 0 ] && [ "$head_code" -eq 0 ]; then
            echo "capture-needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "capture-needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture maps in CI on cache miss
        if: steps.maps.outputs.capture-needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf __stylemaps__

          git checkout --force "${{ github.event.pull_request.base.sha }}"
          pnpm install --frozen-lockfile
          pnpm add --save-dev --save-exact --config.minimum-release-age=0 "styleproof@${STYLEPROOF_VERSION}"
          pnpm exec playwright install --with-deps chromium
          pnpm build
          nohup pnpm preview > /tmp/preview-base.log 2>&1 &
          npx --yes wait-on http://localhost:3000
          pnpm exec styleproof-map --spec e2e/styleproof.spec.ts --dir base --base-dir __stylemaps__ --keep-har --no-upload

          git checkout --force "${{ github.event.pull_request.head.sha }}"
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
          pkill -f "vite preview" || true
          pnpm build
          nohup pnpm preview > /tmp/preview-head.log 2>&1 &
          npx --yes wait-on http://localhost:3000
          if find __stylemaps__/base -name '*.har' -print -quit | grep -q .; then
            STYLEPROOF_REPLAY_FROM=__stylemaps__/base pnpm exec styleproof-map --spec e2e/styleproof.spec.ts --dir head --base-dir __stylemaps__ --no-upload
          else
            pnpm exec styleproof-map --spec e2e/styleproof.spec.ts --dir head --base-dir __stylemaps__ --no-upload
          fi

      # StyleProof v4.0.1
      - uses: BenSheridanEdwards/StyleProof@9a2f2cd9ee8168eba67040633934c762454edc4a
        with:
          baseline-dir: __stylemaps__/base
          fresh-dir: __stylemaps__/head
          require-approval: true
