name: StyleProof

on: pull_request

# The report comment, the report branch, and the StyleProof commit status all
# need write access.
permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: styleproof-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  styleproof:
    name: Computed-style visual gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.minimum-release-age=0

      - id: maps
        name: Restore cached StyleProof maps
        shell: bash
        run: |
          set -e
          MAP_ROOT="$RUNNER_TEMP/styleproof-maps"
          rm -rf "$MAP_ROOT"
          git checkout --force "${{ github.event.pull_request.base.sha }}"
          set +e
          PATH="$PWD/node_modules/.bin:$PATH" node node_modules/styleproof/bin/styleproof-map.mjs --restore --sha "${{ github.event.pull_request.base.sha }}" --dir base --base-dir "$MAP_ROOT" --spec e2e/styleproof.spec.ts
          base_code=$?
          set -e
          git checkout --force "${{ github.event.pull_request.head.sha }}"
          set +e
          PATH="$PWD/node_modules/.bin:$PATH" node node_modules/styleproof/bin/styleproof-map.mjs --restore --sha "${{ github.event.pull_request.head.sha }}" --dir head --base-dir "$MAP_ROOT" --spec e2e/styleproof.spec.ts
          head_code=$?
          set -e
          echo "base-hit=$([ "$base_code" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "head-hit=$([ "$head_code" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          if [ "$base_code" -eq 0 ] && [ "$head_code" -eq 0 ]; then
            echo "capture-needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "capture-needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture maps in CI on cache miss
        if: steps.maps.outputs.capture-needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MAP_ROOT="$RUNNER_TEMP/styleproof-maps"
          STYLEPROOF_VERSION="$(node -p "require('./node_modules/styleproof/package.json').version")"

          if [ "${{ steps.maps.outputs.base-hit }}" != 'true' ]; then
            rm -rf "$MAP_ROOT"
            git checkout --force "$BASE_SHA"
            pnpm install --frozen-lockfile --config.minimum-release-age=0
            pnpm add --save-dev --save-exact --config.minimum-release-age=0 "styleproof@${STYLEPROOF_VERSION}"
            git checkout -- package.json pnpm-lock.yaml
            PATH="$PWD/node_modules/.bin:$PATH" playwright install --with-deps chromium
            PATH="$PWD/node_modules/.bin:$PATH" node node_modules/styleproof/bin/styleproof-map.mjs --spec e2e/styleproof.spec.ts --dir base --base-dir "$MAP_ROOT" --keep-har --sha "$BASE_SHA" --upload

            git checkout --force "$HEAD_SHA"
            pnpm install --frozen-lockfile --config.minimum-release-age=0
          else
            rm -rf "$MAP_ROOT/head"
          fi
          PATH="$PWD/node_modules/.bin:$PATH" playwright install --with-deps chromium
          if find "$MAP_ROOT/base" -name '*.har' -print -quit | grep -q .; then
            PATH="$PWD/node_modules/.bin:$PATH" STYLEPROOF_REPLAY_FROM="$MAP_ROOT/base" node node_modules/styleproof/bin/styleproof-map.mjs --spec e2e/styleproof.spec.ts --dir head --base-dir "$MAP_ROOT" --sha "$HEAD_SHA" --upload
          else
            PATH="$PWD/node_modules/.bin:$PATH" node node_modules/styleproof/bin/styleproof-map.mjs --spec e2e/styleproof.spec.ts --dir head --base-dir "$MAP_ROOT" --sha "$HEAD_SHA" --upload
          fi

      # StyleProof v4.4.21
      - uses: BenSheridanEdwards/StyleProof@61753797bd07f44654e8200a7bfd18f0c0cee94f
        with:
          baseline-dir: ${{ runner.temp }}/styleproof-maps/base
          fresh-dir: ${{ runner.temp }}/styleproof-maps/head
          require-approval: true
