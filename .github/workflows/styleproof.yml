name: StyleProof

on: pull_request

# The report comment, the report branch, and the StyleProof commit status all
# need write access.
permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: styleproof-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  styleproof:
    name: Computed-style visual gate
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://localhost:3000
      STYLEPROOF_VERSION: "4.4.15"
      STYLEPROOF_MAP_STORE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.minimum-release-age=0

      - id: maps
        name: Restore cached StyleProof maps
        shell: bash
        run: |
          set +e
          MAP_ROOT="$RUNNER_TEMP/styleproof-maps"
          rm -rf "$MAP_ROOT"
          pnpm exec styleproof-map --restore --sha "${{ github.event.pull_request.base.sha }}" --dir base --base-dir "$MAP_ROOT" --spec e2e/styleproof.spec.ts
          base_code=$?
          pnpm exec styleproof-map --restore --sha "${{ github.event.pull_request.head.sha }}" --dir head --base-dir "$MAP_ROOT" --spec e2e/styleproof.spec.ts
          head_code=$?
          set -e
          echo "base-hit=$([ "$base_code" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "head-hit=$([ "$head_code" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          if [ "$base_code" -eq 0 ] && [ "$head_code" -eq 0 ]; then
            echo "capture-needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "capture-needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture maps in CI on cache miss
        if: steps.maps.outputs.capture-needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          MAP_ROOT="$RUNNER_TEMP/styleproof-maps"

          if [ "${{ steps.maps.outputs.base-hit }}" != 'true' ]; then
            rm -rf "$MAP_ROOT"
            git checkout --force "${{ github.event.pull_request.base.sha }}"
            pnpm install --frozen-lockfile --config.minimum-release-age=0
            pnpm add --save-dev --save-exact --config.minimum-release-age=0 "styleproof@${STYLEPROOF_VERSION}"
            git checkout -- package.json pnpm-lock.yaml
            pnpm exec playwright install --with-deps chromium
            pnpm build
            nohup pnpm preview > /tmp/preview-base.log 2>&1 &
            npx --yes wait-on http://localhost:3000
            pnpm exec styleproof-map --spec e2e/styleproof.spec.ts --dir base --base-dir "$MAP_ROOT" --keep-har --sha "${{ github.event.pull_request.base.sha }}" --upload
            pkill -f "vite preview" || true

            git checkout --force "${{ github.event.pull_request.head.sha }}"
            pnpm install --frozen-lockfile --config.minimum-release-age=0
          else
            rm -rf "$MAP_ROOT/head"
          fi
          pnpm exec playwright install --with-deps chromium
          pnpm build
          nohup pnpm preview > /tmp/preview-head.log 2>&1 &
          npx --yes wait-on http://localhost:3000
          if find "$MAP_ROOT/base" -name '*.har' -print -quit | grep -q .; then
            STYLEPROOF_REPLAY_FROM="$MAP_ROOT/base" pnpm exec styleproof-map --spec e2e/styleproof.spec.ts --dir head --base-dir "$MAP_ROOT" --sha "${{ github.event.pull_request.head.sha }}" --upload
          else
            pnpm exec styleproof-map --spec e2e/styleproof.spec.ts --dir head --base-dir "$MAP_ROOT" --sha "${{ github.event.pull_request.head.sha }}" --upload
          fi

      # StyleProof v4.4.15
      - uses: BenSheridanEdwards/StyleProof@a668032adcbeb35efa14dcef6e9f366dcc9b4d5a
        with:
          baseline-dir: ${{ runner.temp }}/styleproof-maps/base
          fresh-dir: ${{ runner.temp }}/styleproof-maps/head
          require-approval: true
