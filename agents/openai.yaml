# Root agent manifest — vendor-neutral entry point.
#
# The operating doctrine is not welded to one vendor. `AGENTS.md` is the
# tool-agnostic contract (agents.md convention); `CLAUDE.md` is the Claude layer
# on top of it; this file is the equivalent entry point for OpenAI-family agents.
# All three defer to the same source of detail under `.agents/`.
interface:
  display_name: "Agentic Repo Template"
  short_description: "Reference scaffold: the files, gates, and context that make agent-written code enterprise-grade."
  default_prompt: "Read AGENTS.md and .agents/ before writing. Follow the gates; done means `pnpm verify` and `pnpm e2e` are green."

context:
  # Read these before writing any code.
  contract: "AGENTS.md"
  detail:
    - ".agents/project/AGENTIC_INFRASTRUCTURE.md"
    - ".agents/project/ARCHITECTURE.md"
    - ".agents/project/CONVENTIONS.md"
    - ".agents/project/DEFINITION_OF_DONE.md"
    - ".agents/project/QUALITY_GATES.md"
    - ".agents/project/PR_QUALITY.md"
    - ".agents/project/TECH_STACK.md"
    - ".agents/project/GLOSSARY.md"
  decisions: ".agents/decisions/"
  templates: ".agents/templates/"

commands:
  verify: "pnpm verify"
  e2e: "pnpm e2e"
  validate_pr_body: "node scripts/validate-pr-body.mjs"
