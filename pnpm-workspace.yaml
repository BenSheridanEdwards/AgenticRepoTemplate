# pnpm settings (pnpm ≥ 11 reads them here, not from package.json).
# Native packages whose post-install build scripts we explicitly trust to run.
# Declaring them keeps installs reproducible and makes the trust decision a
# reviewable line rather than an interactive prompt.
allowBuilds:
  '@biomejs/biome': true
  '@swc/core': true
  esbuild: true

minimumReleaseAgeExclude:
  - styleproof@3.1.2

# Force-patch a transitive high-severity advisory the CI security gate caught:
# @lhci/cli (and its inquirer > external-editor chain) pulled tmp < 0.2.6, which
# has a path-traversal vulnerability (GHSA-ph9p-34f9-6g65). Pin the patched line
# across the whole tree.
overrides:
  tmp: '>=0.2.6'
