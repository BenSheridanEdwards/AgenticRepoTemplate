# pnpm settings (pnpm ≥ 11 reads them here, not from package.json).
# Native packages whose post-install build scripts we explicitly trust to run.
# Declaring them keeps installs reproducible and makes the trust decision a
# reviewable line rather than an interactive prompt.
allowBuilds:
  '@biomejs/biome': true
  '@swc/core': true
  esbuild: true
